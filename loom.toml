# Loom configuration
# Lists all repositories that loom scans and manages.

[loom]
# Linear team/project for sync (fill in when Linear is wired)
# linear_team = "ART"
# linear_project = "ART"

# Default dispatch settings
# max_concurrent_agents = 2
# agent_timeout_minutes = 30

# Loom manages itself first.
[[repo]]
name = "loom"
path = "~/remotes/art/loom"
lang = "rust"
self = true  # This repo IS loom -- used for dogfooding

