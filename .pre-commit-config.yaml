repos:
  # Markdown formatting
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          - mdformat-frontmatter
        exclude: '^\.beads/'

  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending

  # Bead traceability (Golden Rule 11)
  - repo: local
    hooks:
      - id: bead-ref
        name: bead reference in commit
        entry: scripts/check-bead-ref.sh
        language: script
        stages: [commit-msg]
        always_run: true

  # Rust-specific checks (Incremental, Full-Crate Check)
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && cargo fmt -- --check'
        language: system
        files: \.rs$
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'ROOT="$(git rev-parse --show-toplevel)" && cd "$ROOT" && PKG_CONFIG_PATH="${LEY_LINE_DIR:-$ROOT/../ley-line}/rs/pkgconfig" cargo clippy --all-targets -- -D warnings'
        language: system
        files: \.rs$
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: bash -c 'ROOT="$(git rev-parse --show-toplevel)" && cd "$ROOT" && PKG_CONFIG_PATH="${LEY_LINE_DIR:-$ROOT/../ley-line}/rs/pkgconfig" cargo test --quiet'
        language: system
        files: \.rs$
        pass_filenames: false
        stages: [pre-push]

      # Elixir-specific checks (Lightning fast, targeting modified files)
      - id: mix-format
        name: mix format
        # "${@#conductor/}" strips the 'conductor/' prefix from the file paths passed by pre-commit
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)/conductor" && exec mix format --check-formatted "${@#conductor/}"' --
        language: system
        files: ^conductor/.*\.exs?$
        pass_filenames: true

      - id: mix-credo
        name: mix credo
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)/conductor" && exec mix credo --strict "${@#conductor/}"' --
        language: system
        files: ^conductor/.*\.exs?$
        pass_filenames: true

      - id: mix-test
        name: mix test
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)/conductor" && mix test --color'
        language: system
        files: ^conductor/.*\.exs?$
        pass_filenames: false
        stages: [pre-push]
