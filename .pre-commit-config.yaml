repos:
  # Markdown formatting
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          - mdformat-frontmatter
        exclude: '^\.beads/'

  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending

  # Golden Rules enforcement
  - repo: local
    hooks:
      # Rule 1: No versioned files
      - id: no-versioned-files
        name: no versioned files (Rule 1)
        entry: scripts/check-versioned-files.sh
        language: script
        types: [file]

      # Rule 2: File length limit
      - id: file-length
        name: file length check (Rule 2)
        entry: scripts/check-file-length.sh
        language: script
        types_or: [rust, python, go, javascript]
        # Hook is now baseline-aware — only fails if file CROSSED the limit
        # or GREW while already over. No exclude list needed.

      # Rule 11: Every commit references a bead
      - id: bead-ref
        name: bead reference in commit (Rule 11)
        entry: scripts/check-bead-ref.sh
        language: script
        stages: [commit-msg]
        always_run: true

  # Rust-specific checks (Incremental, Full-Crate Check)
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && cargo fmt -- --check'
        language: system
        files: \.rs$
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'ROOT="$(git rev-parse --show-toplevel)" && cd "$ROOT" && PKG_CONFIG_PATH="${LEY_LINE_DIR:-$ROOT/../ley-line}/rs/pkgconfig" cargo clippy --all-targets -- -D warnings'
        language: system
        files: \.rs$
        pass_filenames: false

      - id: semgrep
        name: semgrep custom rules
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && semgrep --config .semgrep/rules.yml src/ --error'
        language: system
        files: \.rs$
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: bash -c 'ROOT="$(git rev-parse --show-toplevel)" && cd "$ROOT" && PKG_CONFIG_PATH="${LEY_LINE_DIR:-$ROOT/../ley-line}/rs/pkgconfig" cargo test --quiet'
        language: system
        files: \.rs$
        pass_filenames: false
        stages: [pre-push]

      # Conductor (Elixir) moved to rig repo — see rig-962ca4
