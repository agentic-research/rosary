# apko.yaml — assemble rsry OCI image
#
# apko build apko.yaml rosary:latest rosary.tar
#
# Result: distroless OCI image with just the rsry binary.
# No shell, no package manager. Minimal attack surface.
# SBOM auto-generated when using `apko publish`.

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - ca-certificates-bundle
    - wolfi-baselayout
    - rosary

accounts:
  groups:
    - groupname: rosary
      gid: 65533
  users:
    - username: rosary
      uid: 65533
      gid: 65533
  run-as: 65533

environment:
  RSRY_DATA: /data

paths:
  - path: /data
    type: directory
    uid: 65533
    gid: 65533
    permissions: 0o755

entrypoint:
  command: /usr/bin/rsry

cmd: serve

archs:
  - x86_64
  - aarch64

# Per-origin layering: packages from the same upstream share a layer.
# Reduces delta pulls by ~70% on updates (only changed layers re-download).
layering:
  strategy: origin

annotations:
  org.opencontainers.image.title: rosary
  org.opencontainers.image.description: "rsry: autonomous work orchestrator"
  org.opencontainers.image.source: https://github.com/agentic-research/rosary
  org.opencontainers.image.licenses: Apache-2.0
