name: Rosary CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.LEYLINE_PAT }}@github.com/".insteadOf "https://github.com/"
      - name: install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - run: cargo check

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.LEYLINE_PAT }}@github.com/".insteadOf "https://github.com/"
      - name: install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - run: cargo test

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.LEYLINE_PAT }}@github.com/".insteadOf "https://github.com/"
      - name: install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  conductor-test:
    name: conductor (elixir)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: conductor
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.19"
      - name: cache deps
        uses: actions/cache@v5
        with:
          path: |
            conductor/deps
            conductor/_build
          key: conductor-${{ runner.os }}-${{ hashFiles('conductor/mix.lock') }}
          restore-keys: conductor-${{ runner.os }}-
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test
      - run: mix format --check-formatted
