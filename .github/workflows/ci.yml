name: Rosary CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly clean build (no cache) to catch stale-cache regressions
    - cron: '17 4 * * 1'

permissions:
  contents: read
  actions: write

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.LEYLINE_PAT }}@github.com/".insteadOf "https://github.com/"
      - name: install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        if: github.event_name != 'schedule'
        with:
          shared-key: rosary-${{ hashFiles('Cargo.lock') }}
      - run: cargo check

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.LEYLINE_PAT }}@github.com/".insteadOf "https://github.com/"
      - name: install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        if: github.event_name != 'schedule'
        with:
          shared-key: rosary-${{ hashFiles('Cargo.lock') }}
      - run: cargo test

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.LEYLINE_PAT }}@github.com/".insteadOf "https://github.com/"
      - name: install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
        if: github.event_name != 'schedule'
        with:
          shared-key: rosary-${{ hashFiles('Cargo.lock') }}
      - run: cargo clippy -- -D warnings

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

