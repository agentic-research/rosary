name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write  # cosign keyless signing

env:
  TAG: ${{ inputs.tag || github.ref_name }}
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/rosary

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
            artifact: rsry-darwin-arm64
          - os: ubuntu-latest
            platform: linux-amd64
            artifact: rsry-linux-amd64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            artifact: rsry-linux-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-cargo-release-

      - name: Build release binary
        run: cargo build --release --bin rsry

      - name: Smoke test
        run: |
          target/release/rsry --help
          target/release/rsry --version

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          cp target/release/rsry artifacts/${{ matrix.artifact }}

      - name: Codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign -s - --force --deep --entitlements entitlements.plist artifacts/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}

  release:
    name: Create Release
    if: always()
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum rsry-* > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          files: release-assets/*

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        working-directory: release-assets
        run: |
          for f in rsry-*; do
            cosign sign-blob --yes "$f" --output-signature "${f}.sig" --output-certificate "${f}.cert"
          done

      - name: Upload signatures to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            release-assets/*.sig
            release-assets/*.cert
