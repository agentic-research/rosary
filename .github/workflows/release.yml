name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write   # cosign keyless + SLSA provenance
  actions: read      # SLSA provenance detection

env:
  TAG: ${{ inputs.tag || github.ref_name }}
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/rosary
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
            artifact: rsry-darwin-arm64
          - os: ubuntu-latest
            platform: linux-amd64
            artifact: rsry-linux-amd64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            artifact: rsry-linux-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.LEYLINE_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install --cask fuse-t

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-cargo-release-

      - name: Setup fuse-t pkgconfig (macOS)
        if: runner.os == 'macOS'
        run: |
          # Cargo fetches ley-line as a git dep; we need its pkgconfig wrapper
          # for fuser to find fuse-t. Fetch first, then locate.
          cargo fetch
          LL_PKG=$(find ~/.cargo/git/checkouts -name "pkgconfig" -path "*/ley-line*" -type d 2>/dev/null | head -1)
          if [ -n "$LL_PKG" ]; then
            echo "PKG_CONFIG_PATH=$LL_PKG" >> "$GITHUB_ENV"
          fi

      - name: Build release binary
        run: cargo build --release --bin rsry

      - name: Smoke test
        run: |
          target/release/rsry --help
          target/release/rsry --version

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          cp target/release/rsry artifacts/${{ matrix.artifact }}

      - name: Codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign -s - --force --deep --entitlements entitlements.plist artifacts/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}

  release:
    name: Create Release
    if: always()
    needs: build
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum rsry-* > checksums-sha256.txt

      - name: Generate subject hashes for SLSA
        id: hash
        working-directory: release-assets
        run: |
          echo "hashes=$(sha256sum rsry-* | base64 -w0)" >> "$GITHUB_OUTPUT"

      # --- SBOM ---
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: release-assets/rsry.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          files: release-assets/*

      # --- Cosign ---
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        working-directory: release-assets
        run: |
          for f in rsry-*; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes "$f" \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.cert"
          done

      - name: Upload signatures to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            release-assets/*.sig
            release-assets/*.cert

  # --- SLSA Provenance (Level 3) ---
  provenance:
    name: SLSA Provenance
    needs: release
    if: always()
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true
