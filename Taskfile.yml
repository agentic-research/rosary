version: '3'

vars:
  # ley-line ships a fuse.pc wrapper that maps fuse-t for the fuser crate.
  # Adjust LEY_LINE_DIR if ley-line is checked out elsewhere.
  LEY_LINE_DIR: '{{.ROOT_DIR}}/../ley-line'
  FUSE_PKG_CONFIG_PATH:
    sh: 'if [ "$(uname)" = "Darwin" ]; then echo "{{.LEY_LINE_DIR}}/rs/pkgconfig"; fi'
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  UNAME_M:
    sh: uname -m

env:
  PKG_CONFIG_PATH: '{{.FUSE_PKG_CONFIG_PATH}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build rsry binary (debug)
    cmds:
      - cargo build

  release:
    desc: Build rsry binary (release)
    cmds:
      - cargo build --release

  test:
    desc: Run all tests (Rust + Elixir)
    cmds:
      - cargo test
      - |
        if [ -d conductor/deps ]; then
          cd conductor && mix test
        else
          echo "SKIP: conductor tests (run 'cd conductor && mix deps.get' first)"
        fi

  check:
    desc: Compile check without codegen
    cmds:
      - cargo check

  lint:
    desc: Run clippy + Elixir compile warnings
    deps: [fmt]
    cmds:
      - cargo clippy -- -D warnings
      - |
        if [ -d conductor/deps ]; then
          cd conductor && mix compile --warnings-as-errors
        else
          echo "SKIP: conductor lint (run 'cd conductor && mix deps.get' first)"
        fi

  fmt:
    desc: Format code (Rust + Elixir)
    cmds:
      - cargo fmt
      - |
        if [ -d conductor/deps ]; then
          cd conductor && mix format
        else
          echo "SKIP: conductor fmt (run 'cd conductor && mix deps.get' first)"
        fi

  install:
    desc: Build, codesign, and install rsry to ~/.local/bin
    cmds:
      - cargo build --release
      - mkdir -p ~/.local/bin
      - cp target/release/rsry ~/.local/bin/rsry
      - codesign -s - --force --deep --entitlements entitlements.plist ~/.local/bin/rsry
      - echo "Installed rsry to ~/.local/bin/rsry (codesigned)"
      - 'echo "Installed. Running rsry processes use old binary until next MCP reconnect."'

  overnight:
    desc: Start overnight loop (concurrency=1, bugs first, caffeinate)
    deps: [install]
    cmds:
      - |
        caffeinate -dims &
        echo "Caffeinate PID: $!"
        nohup rsry run --config rosary-self.toml --overnight > /tmp/rsry-overnight.log 2>&1 &
        echo "Rosary PID: $!"
        echo "Log: /tmp/rsry-overnight.log"
        echo "Stop: kill $(cat /tmp/rsry-overnight.pid 2>/dev/null || echo $!)"
        tail -f /tmp/rsry-overnight.log

  e2e:
    desc: End-to-end sandbox test (requires Dolt server in .beads/)
    deps: [build]
    cmds:
      - ./scripts/e2e-sandbox.sh

  apk:
    desc: Build distroless OCI image via melange + apko (release)
    cmds:
      - melange keygen melange.rsa
      - |
        melange build melange.yaml \
          --arch {{.UNAME_M}} \
          --signing-key melange.rsa \
          --out-dir ./packages
      - |
        apko build apko.yaml \
          rosary:{{.VERSION}} \
          rosary.tar \
          --keyring-append melange.rsa.pub
      - echo "Built rosary.tar (load with docker load < rosary.tar)"

  setup:
    desc: First-time setup — install git hooks, conductor deps
    cmds:
      - |
        if command -v pre-commit >/dev/null 2>&1; then
          pre-commit install
          pre-commit install --hook-type commit-msg
          echo "✓ Git hooks installed (pre-commit + commit-msg)"
        else
          echo "SKIP: pre-commit not found (brew install pre-commit)"
        fi
      - |
        if command -v mix >/dev/null 2>&1; then
          cd conductor && mix deps.get
          echo "✓ Conductor deps installed"
        else
          echo "SKIP: Elixir not found (conductor is optional)"
        fi
      - |
        if command -v rsry >/dev/null 2>&1; then
          rsry enable .
          echo "✓ Repo registered with rosary"
        else
          echo "SKIP: rsry not found (brew install rosary — coming soon)"
        fi

  all:
    desc: fmt + check + lint + test
    cmds:
      - task: fmt
      - task: check
      - task: lint
      - task: test
