version: '3'

vars:
  # ley-line ships a fuse.pc wrapper that maps fuse-t for the fuser crate.
  # Adjust LEY_LINE_DIR if ley-line is checked out elsewhere.
  LEY_LINE_DIR: '{{.ROOT_DIR}}/../ley-line'
  FUSE_PKG_CONFIG_PATH:
    sh: 'if [ "$(uname)" = "Darwin" ]; then echo "{{.LEY_LINE_DIR}}/rs/pkgconfig"; fi'
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  UNAME_M:
    sh: uname -m

env:
  PKG_CONFIG_PATH: '{{.FUSE_PKG_CONFIG_PATH}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build rsry binary (debug)
    cmds:
      - cargo build

  release:
    desc: Build rsry binary (release)
    cmds:
      - cargo build --release

  test:
    desc: Run all tests (Rust + Elixir)
    cmds:
      - cargo test

  check:
    desc: Compile check without codegen
    cmds:
      - cargo check

  lint:
    desc: Run clippy
    deps: [fmt]
    cmds:
      - cargo clippy -- -D warnings

  fmt:
    desc: Format code
    cmds:
      - cargo fmt

  install:
    desc: Build, codesign, install rsry, and set up HTTP MCP service
    cmds:
      - |
        # Check for existing rsry in PATH (brew, cargo install, system package)
        EXISTING=$(command -v rsry 2>/dev/null || true)
        if [ -n "$EXISTING" ] && [ "$EXISTING" != "$HOME/.local/bin/rsry" ]; then
          EXISTING_VER=$("$EXISTING" --version 2>/dev/null || echo "unknown")
          NEW_VER=$(cargo metadata --format-version 1 --no-deps 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])" 2>/dev/null || echo "dev")
          echo "WARNING: found rsry at $EXISTING ($EXISTING_VER)"
          echo "         task install will place rsry at ~/.local/bin/rsry ($NEW_VER)"
          # Check if it's a brew install specifically
          if echo "$EXISTING" | grep -q "homebrew\|Cellar"; then
            echo "         Suggestion: brew unlink rosary"
          fi
          echo ""
          read -p "Continue? [Y/n] " -n 1 -r
          echo
          if [[ ! $REPLY =~ ^[Yy]?$ ]]; then
            echo "Aborted."
            exit 1
          fi
        fi
      - cargo build --release
      - mkdir -p ~/.local/bin ~/.rsry
      # Stage + codesign in /tmp, then atomic rename to install path.
      # This ensures WatchPaths sees exactly one change (the rename),
      # not two (cp then codesign modifying in-place).
      - cp target/release/rsry /tmp/rsry-staged
      - codesign -s - --force --deep --entitlements entitlements.plist /tmp/rsry-staged
      - mv /tmp/rsry-staged ~/.local/bin/rsry
      # macOS WatchPaths doesn't trigger on rename(2). Touch ensures
      # the launchd service restarts after atomic binary replacement.
      - touch ~/.local/bin/rsry
      - echo "Installed rsry to ~/.local/bin/rsry (codesigned)"
      - task: install-service

  install-service:
    desc: Install/update launchd service for rsry HTTP MCP server (macOS)
    platforms: [darwin]
    cmds:
      - |
        PLIST="$HOME/Library/LaunchAgents/com.rosary.serve.plist"
        BIN="$HOME/.local/bin/rsry"
        LOG="$HOME/.rsry/http.log"
        STAGED="/tmp/com.rosary.serve.plist.staged"
        sed -e "s|__RSRY_BIN__|$BIN|g" -e "s|__RSRY_LOG__|$LOG|g" -e "s|__HOME__|$HOME|g" \
          scripts/com.rosary.serve.plist.template > "$STAGED"
        # Only reload launchd if the plist content has actually changed
        # (or doesn't exist yet). On normal `task install`, the binary
        # changes but the plist doesn't — WatchPaths handles the restart.
        if [ ! -f "$PLIST" ] || ! diff -q "$STAGED" "$PLIST" >/dev/null 2>&1; then
          cp "$STAGED" "$PLIST"
          launchctl unload "$PLIST" 2>/dev/null || true
          launchctl load "$PLIST"
          echo "HTTP MCP service (re)loaded (plist changed)"
        else
          echo "HTTP MCP service plist unchanged — WatchPaths handles restart"
        fi
        rm -f "$STAGED"
        echo "  Port: 8383 | Log: $LOG"

  overnight:
    desc: Start overnight loop (concurrency=1, bugs first, caffeinate)
    deps: [install]
    cmds:
      - |
        caffeinate -dims &
        echo "Caffeinate PID: $!"
        nohup rsry run --config rosary-self.toml --overnight > /tmp/rsry-overnight.log 2>&1 &
        echo "Rosary PID: $!"
        echo "Log: /tmp/rsry-overnight.log"
        echo "Stop: kill $(cat /tmp/rsry-overnight.pid 2>/dev/null || echo $!)"
        tail -f /tmp/rsry-overnight.log

  e2e:
    desc: End-to-end sandbox test (requires Dolt server in .beads/)
    deps: [build]
    cmds:
      - ./scripts/e2e-sandbox.sh

  apk:
    desc: Build distroless OCI image via melange + apko (release)
    cmds:
      - melange keygen melange.rsa
      - |
        melange build melange.yaml \
          --arch {{.UNAME_M}} \
          --signing-key melange.rsa \
          --out-dir ./packages
      - |
        apko build apko.yaml \
          rosary:{{.VERSION}} \
          rosary.tar \
          --keyring-append melange.rsa.pub
      - echo "Built rosary.tar (load with docker load < rosary.tar)"

  setup:
    desc: First-time setup — install git hooks, conductor deps
    cmds:
      - |
        if command -v pre-commit >/dev/null 2>&1; then
          pre-commit install
          pre-commit install --hook-type commit-msg
          echo "✓ Git hooks installed (pre-commit + commit-msg)"
        else
          echo "SKIP: pre-commit not found (brew install pre-commit)"
        fi
      - |
        if command -v rsry >/dev/null 2>&1; then
          rsry enable .
          echo "✓ Repo registered with rosary"
        else
          echo "SKIP: rsry not found (brew install rosary — coming soon)"
        fi

  all:
    desc: fmt + check + lint + test
    cmds:
      - task: fmt
      - task: check
      - task: lint
      - task: test
