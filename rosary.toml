# Rosary configuration
# Lists all repositories that rosary scans and manages.

[rosary]
# Linear team/project for sync (fill in when Linear is wired)
# linear_team = "ART"
# linear_project = "ART"

# Default dispatch settings
# max_concurrent_agents = 2
# agent_timeout_minutes = 30

# Rosary manages itself first.
[[repo]]
name = "rosary"
path = "~/remotes/art/rosary"
lang = "rust"
self = true  # This repo IS rosary -- used for dogfooding

