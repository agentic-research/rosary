# .pre-commit-config.yaml — ART ecosystem reference template
# Copy to your repo root and uncomment sections for your languages.
# Prefers Taskfile tasks where available — replace `entry:` with
# `entry: task lint` if your Taskfile wraps these tools.

repos:
  # ── Universal (always enabled) ──────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker

